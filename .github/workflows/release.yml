name: Build & Release

on:
  push:
    tags:
      - 'v*'          # e.g. v1.0.0  → builds all three units
      - 'master-v*'   # e.g. master-v1.1.0 → builds MasterHonda only
      - 'honda-v*'    # e.g. honda-v1.0.1  → builds SlaveHonda only
      - 'wallas-v*'   # e.g. wallas-v1.0.2 → builds SlaveWallas only

jobs:
  build-master:
    name: Build MasterHonda
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'master-')
    steps:
      - uses: actions/checkout@v4

      - name: Compile MasterHonda
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          sketch-paths: |
            - MasterHonda
          libraries: |
            - name: WiFiManager
            - name: ESPAsyncWebServer
            - name: AsyncTCP
            - name: ElegantOTA
          enable-deltas-report: false

      - name: Extract version
        id: ver
        run: |
          VER=$(grep 'FIRMWARE_VERSION' MasterHonda/MasterHonda.ino | head -1 | grep -oP '"[^"]+"' | tr -d '"')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Rename bin
        run: |
          find /home/runner -name '*.bin' | head -1 | xargs -I{} cp {} MasterHonda_v${{ steps.ver.outputs.version }}.bin

      - uses: actions/upload-artifact@v4
        with:
          name: MasterHonda
          path: MasterHonda_v*.bin

  build-honda:
    name: Build SlaveHonda
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'honda-')
    steps:
      - uses: actions/checkout@v4

      - name: Compile SlaveHonda
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          sketch-paths: |
            - SlaveHonda
          libraries: |
            - name: WiFiManager
            - name: ESPAsyncWebServer
            - name: AsyncTCP
            - name: ElegantOTA

      - name: Extract version
        id: ver
        run: |
          VER=$(grep 'FIRMWARE_VERSION' SlaveHonda/SlaveHonda.ino | head -1 | grep -oP '"[^"]+"' | tr -d '"')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Rename bin
        run: |
          find /home/runner -name '*.bin' | head -1 | xargs -I{} cp {} SlaveHonda_v${{ steps.ver.outputs.version }}.bin

      - uses: actions/upload-artifact@v4
        with:
          name: SlaveHonda
          path: SlaveHonda_v*.bin

  build-wallas:
    name: Build SlaveWallas
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'wallas-')
    steps:
      - uses: actions/checkout@v4

      - name: Compile SlaveWallas
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          sketch-paths: |
            - SlaveWallas
          libraries: |
            - name: WiFiManager
            - name: ESPAsyncWebServer
            - name: AsyncTCP
            - name: ElegantOTA

      - name: Extract version
        id: ver
        run: |
          VER=$(grep 'FIRMWARE_VERSION' SlaveWallas/SlaveWallas.ino | head -1 | grep -oP '"[^"]+"' | tr -d '"')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Rename bin
        run: |
          find /home/runner -name '*.bin' | head -1 | xargs -I{} cp {} SlaveWallas_v${{ steps.ver.outputs.version }}.bin

      - uses: actions/upload-artifact@v4
        with:
          name: SlaveWallas
          path: SlaveWallas_v*.bin

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-master, build-honda, build-wallas]
    if: always() && (needs.build-master.result == 'success' || needs.build-honda.result == 'success' || needs.build-wallas.result == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Firmware Release ${{ github.ref_name }}

            ### Flashing via OTA
            1. Open the device web UI → OTA Update tab
            2. Upload the appropriate `.bin` file for each unit

            ### Flashing via USB (first time)
            Use Arduino IDE or esptool.py with the `.bin` file.

            ### Version info
            Each bin file contains the `FIRMWARE_VERSION` string visible in the web UI header.
          files: artifacts/*.bin
          fail_on_unmatched_files: false
