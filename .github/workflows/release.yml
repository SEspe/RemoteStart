name: Build & Release (ESP-IDF)

on:
  push:
    tags:
      - 'v*'         # e.g. v1.0.0  → builds all three units
      - 'master-v*'  # e.g. master-v1.1.0 → MasterRemote only
      - 'honda-v*'   # e.g. honda-v1.0.1  → SlaveHonda only
      - 'wallas-v*'  # e.g. wallas-v1.0.2 → SlaveWallas only

env:
  IDF_VERSION: v6.0.1   # pin ESP-IDF version

jobs:
  build-master:
    name: Build MasterRemote
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'master-')
    steps:
      - uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: esp32
          path: MasterRemote
          command: idf.py build

      - name: Extract version & rename bin
        run: |
          VER=$(grep 'FIRMWARE_VERSION' MasterRemote/main/version.h | grep -oP '"[^"]+"' | tr -d '"')
          cp MasterRemote/build/MasterRemote.bin MasterRemote_v${VER}.bin
          echo "BIN=MasterRemote_v${VER}.bin" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: MasterRemote
          path: ${{ env.BIN }}

  build-honda:
    name: Build SlaveHonda
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'honda-')
    steps:
      - uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: esp32
          path: SlaveHonda
          command: idf.py build

      - name: Extract version & rename bin
        run: |
          VER=$(grep 'FIRMWARE_VERSION' SlaveHonda/main/version.h | grep -oP '"[^"]+"' | tr -d '"')
          cp SlaveHonda/build/SlaveHonda.bin SlaveHonda_v${VER}.bin
          echo "BIN=SlaveHonda_v${VER}.bin" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: SlaveHonda
          path: ${{ env.BIN }}

  build-wallas:
    name: Build SlaveWallas
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'wallas-')
    steps:
      - uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: esp32c6
          path: SlaveWallas
          command: idf.py build

      - name: Extract version & rename bin
        run: |
          VER=$(grep 'FIRMWARE_VERSION' SlaveWallas/main/version.h | grep -oP '"[^"]+"' | tr -d '"')
          cp SlaveWallas/build/SlaveWallas.bin SlaveWallas_v${VER}.bin
          echo "BIN=SlaveWallas_v${VER}.bin" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: SlaveWallas
          path: ${{ env.BIN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-master, build-honda, build-wallas]
    if: always() && (needs.build-master.result == 'success' || needs.build-honda.result == 'success' || needs.build-wallas.result == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build per-unit version summary
        id: versions
        run: |
          SUMMARY=""
          for f in artifacts/*.bin; do
            base=$(basename "$f" .bin)   # e.g. MasterRemote_v1.3.0
            unit="${base%_v*}"           # MasterRemote
            ver="${base##*_}"            # v1.3.0
            SUMMARY="${SUMMARY}- **${unit}** ${ver}"$'\n'
          done
          {
            echo "summary<<VERSIONS_EOF"
            printf '%s' "$SUMMARY"
            echo "VERSIONS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Firmware Release ${{ github.ref_name }}

            ${{ steps.versions.outputs.summary }}

            Built with ESP-IDF ${{ env.IDF_VERSION }}. MasterRemote/SlaveHonda target ESP32; SlaveWallas targets ESP32-C6.

            ### Flash via OTA
            1. Open device web UI → **OTA Update** tab
            2. Select the `.bin` file for that unit
            3. Click **Upload & Flash**

            ### Flash via USB (first time)
            ```
            idf.py -p COMx flash
            ```
            or with esptool:
            ```
            esptool.py --chip esp32 -p COMx write_flash 0x10000 MasterRemote_<ver>.bin      # MasterRemote / SlaveHonda
            esptool.py --chip esp32c6 -p COMx write_flash 0x10000 SlaveWallas_<ver>.bin    # SlaveWallas
            ```
          files: artifacts/*.bin
          fail_on_unmatched_files: false
